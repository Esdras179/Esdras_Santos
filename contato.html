<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Esdras">
    <meta name="description" content="Página de Contato - Atividade HTML">
    <title>Contato - Atividade HTML</title>
</head>

<body style="background-color: #0f172a; color: white; font-family: Arial;">

    <header style="background-color: #2563eb; padding: 15px;">
        <h1>Contato</h1>
        <nav>
            <ul style="list-style: none;">
                <li><a href="./index.html" style="color: white;">Início</a></li>
                <li><a href="./sobre.html" style="color: white;">Sobre</a></li>
                <li><a href="./servicos.html" style="color: white;">Serviços</a></li>
                <li><a href="./contato.html" style="color: white;">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main style="background-color: #1e293b; padding: 20px;">
        <h2>Fale comigo</h2>

        <form action="https://docs.google.com/spreadsheets/d/1kinC55SRpzyMhH4tN-wESLuFBLGkC0vTVhcLaSvHnnw/edit?usp=sharing" method="post">
            <fieldset>
                <legend>Dados de contato:</legend>
            <table>
                <tr>
                    <td><label for="nome">Nome<span style="color: red;">*</span>:</label></td>
                    <td><input type="text" id="nome" required></td>
                </tr>
                <tr>
                    <td><label for="email">Email<span style="color: red;">*</span>:</label></td>
                    <td><input type="email" id="email" required></td>
                <tr>
                    <td><label for="senha">Senha<span style="color: red;">*</span>:</label></td>
                    <td><input type="password" id="senha" required></td>
                </tr>
                </tr>
                <tr>
                    <td><label for="tel">Telefone<span style="color: red;">*</span>:</label></td>
                    <td><input type="tel" id="tel" required></td>
                </tr>
                <td><label for="sex">Sexo:</label></td>

                <td><input type="radio" name="sexo" id="masc">
                    <label for="masc" id="masc">Masculino</label>
                </td>

                <td><input type="radio" name="sexo" id="fem">
                    <label for="fem" id="fem">Feminino</label>
                </td>
                
                </tr>
                <td><label for="onde">Onde me conheceu?</label></td>

                <td><input type="checkbox" name="discord" id="discord">
                    <label for="discord" id="discord">Discord</label>
                </td>

                <td><input type="checkbox" name="Google" id="google">
                    <label for="google" id="google">Google</label>
                </td>

                <td><input type="checkbox" name="indicação" id="indicação">
                    <label for="indicação" id="indicação">Indicação</label>
                </td>

                <tr><td><label for="arq">Anexo de arquivo:</label></td>
                    <td><input type="file" name="arq" id="arq"></td>
                </tr>

                <tr><td><label for="data">Data:</label></td>
                    <td><input type="date" name="data" id="data"></td>
                </tr>

                <tr><td><input type="submit" value="Enviar"></td></tr>
            </table>
            </fieldset>
        </form>

        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d124582.84029301285!2d-38.336719355012505!3d-12.633977283368685!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x71669dcec920d9d%3A0x44eb484149f47796!2sSENAI%20CAMA%C3%87ARI!5e0!3m2!1spt-BR!2sbr!4v1772076497927!5m2!1spt-BR!2sbr" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

        <p style="margin-top: 20px;">
            <a href="index.html" style="color: #38bdf8;">Voltar para a página inicial</a>
        </p>
    </main>
</body>


<footer style="background-color: #2563eb; padding: 10px;">
    <p>Página criada por Esdras Santos - 2026</p>
</footer>

</html>
