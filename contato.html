<body style="background-color: #0f172a; color: white;">

        <main>
        <section class="banner"><img src="./IMG/banner-portfolio-senai[105527]_267825_img.png" alt=""></section>
        <header style="background-color: #2563eb;">
            <hr>

            <menu>
                <ul type="square">
                    <li><a href="./index.html" style="color: white;">Início</a></li>

                </ul>
            </menu>
        </header>
    </main>

    <main>
        <h2>Fale comigo</h2>

        <form action="#" method="post">
            <fieldset>
                <legend>Dados de contato:</legend>
                <table>
                    <tr>
                        <td><label for="nome">Nome<span style="color: red;">*</span>:</label></td>
                        <td><input type="text" id="nome" required></td>
                    </tr>

                    <tr>
                        <td><label for="email">Email<span style="color: red;">*</span>:</label></td>
                        <td><input type="email" id="email" required></td>
                    </tr>

                    <tr>
                        <td><label for="senha">Senha<span style="color: red;">*</span>:</label></td>
                        <td><input type="password" id="senha" required></td>
                    </tr>

                    <tr>
                        <td><label for="tel">Telefone<span style="color: red;">*</span>:</label></td>
                        <td><input type="tel" id="tel" required></td>
                    </tr>

                    <tr>
                        <td><label for="sex">Sexo:</label></td>
                        <td>
                            <input type="radio" name="sexo" id="masc">
                            <label for="masc">Masculino</label>

                            <input type="radio" name="sexo" id="fem">
                            <label for="fem">Feminino</label>
                        </td>
                    </tr>

                    <tr>
                        <td><label for="onde">Onde me conheceu?</label></td>
                        <td>
                            <input type="checkbox" name="discord" id="discord">
                            <label for="discord">Discord</label>

                            <input type="checkbox" name="Google" id="google">
                            <label for="google">Google</label>

                            <input type="checkbox" name="indicacao" id="indicacao">
                            <label for="indicacao">Indicação</label>
                        </td>
                    </tr>

                    <tr>
                        <td><label for="arq">Anexo de arquivo:</label></td>
                        <td><input type="file" name="arq" id="arq"></td>
                    </tr>

                    <tr>
                        <td><label for="data">Data:</label></td>
                        <td><input type="date" name="data" id="data"></td>
                    </tr>

                    <tr>
                        <td><input type="submit" value="Enviar"></td>
                    </tr>
                </table>
            </fieldset>
        </form>

        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d124582.84029301285!2d-38.336719355012505!3d-12.633977283368685!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x71669dcec920d9d%3A0x44eb484149f47796!2sSENAI%20CAMA%C3%87ARI!5e0!3m2!1spt-BR!2sbr!4v1772076497927!5m2!1spt-BR!2sbr"

        </p>
    </main>
