<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Esdras">
    <meta name="description" content="Página de Contato - Atividade HTML">
    <title>Contato - Atividade HTML</title>
</head>

<body style="background-color: #0f172a; color: white; font-family: Arial;">

    <header style="background-color: #2563eb; padding: 15px;">
        <h1>Contato</h1>
        <nav>
            <ul style="list-style: none;">
                <li><a href="./index.html" style="color: white;">Início</a></li>
                <li><a href="./sobre.html" style="color: white;">Sobre</a></li>
                <li><a href="./servicos.html" style="color: white;">Serviços</a></li>
                <li><a href="./contato.html" style="color: white;">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main style="background-color: #1e293b; padding: 20px;">
        <h2>Fale comigo</h2>

        <form>
            <label for="name">Nome completo:</label><br>
            <input type="text" id="name" name="name"><br><br>
            <label for="idade">Idade:</label><br>
            <input type="number" id="idade" name="idade"><br><br>
            <label for="descrição">Descrição:</label><br>
            <input type="text" id="descrição" name="descrição"><br><br>
            <input type="submit" value="Enviar">
        </form>

        <p style="margin-top: 20px;">
            <a href="index.html" style="color: #38bdf8;">Voltar para a página inicial</a>
        </p>
    </main>

    <table border="2">
        <tr>
            <td>Nome</td>
            <td>Idade</td>
            <td>Descrição</td>
        </tr>

        <td rowspan="2">Esdras</td>
        <td rowspan="2">18</td>
        <td rowspan="2">SENAI</td>
    </table>

</body>


<footer style="background-color: #2563eb; padding: 10px;">

</footer>
